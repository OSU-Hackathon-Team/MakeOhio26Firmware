; ESP32 Sniffer — two build environments, one for each physical device.
; Flash esp32_1 to the first ESP32 and esp32_2 to the second.

[env:esp32_1]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
  -DDEVICE_ID=1
  -DTARGET_MAC
  -DTARGET_MAC_0=0xE6
  -DTARGET_MAC_1=0xA6
  -DTARGET_MAC_2=0x73
  -DTARGET_MAC_3=0x84
  -DTARGET_MAC_4=0x7F
  -DTARGET_MAC_5=0xE3

[env:esp32_2]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
  -DDEVICE_ID=2
  -DTARGET_MAC
  -DTARGET_MAC_0=0xE6
  -DTARGET_MAC_1=0xA6
  -DTARGET_MAC_2=0x73
  -DTARGET_MAC_3=0x84
  -DTARGET_MAC_4=0x7F
  -DTARGET_MAC_5=0xE3
