; ESP32 Sniffer — two build environments, one for each physical device.
; Flash esp32_1 to the first ESP32 and esp32_2 to the second.

[env:esp32_1]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DDEVICE_ID=1

[env:esp32_2]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DDEVICE_ID=2
